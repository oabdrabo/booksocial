<div class="comment{{ ' reply' if c['parent_id'] }}" id="c-{{ c['id'] }}"><a href="{{ url_for('profile', username=c['username']) }}"><b>{{ c['username'] }}</b></a> {{ c['body']|mentions|safe }}<button class="cbtn" onclick="reply({{ c['id'] }},'{{ c['username'] }}')" aria-label="Reply">{% include "icons/reply.svg" %}</button>{% if g.user and g.user['id'] == c['user_id'] %}<button class="cbtn danger" hx-delete="{{ url_for('delete_comment', cid=c['id']) }}" hx-target="#c-{{ c['id'] }}" hx-swap="outerHTML" aria-label="Delete">{% include "icons/trash.svg" %}</button>{% endif %}</div>
